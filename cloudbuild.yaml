# cloudbuild.yaml
#
# Connects to Cloud Build so every push to the main branch
# automatically builds and redeploys the backend.
#
# To enable:
#   gcloud builds triggers create github \
#     --repo-name=YOUR_REPO \
#     --repo-owner=YOUR_GITHUB_USERNAME \
#     --branch-pattern=main \
#     --build-config=cloudbuild.yaml

steps:
  # Build the Docker image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/agronet-backend:$COMMIT_SHA
      - -t
      - gcr.io/$PROJECT_ID/agronet-backend:latest
      - .

  # Push to Container Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      - push
      - gcr.io/$PROJECT_ID/agronet-backend:$COMMIT_SHA

  # Deploy to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - run
      - deploy
      - agronet-backend
      - --image=gcr.io/$PROJECT_ID/agronet-backend:$COMMIT_SHA
      - --platform=managed
      - --region=us-central1
      - --allow-unauthenticated
      - --session-affinity
      - --min-instances=1
      - --quiet

images:
  - gcr.io/$PROJECT_ID/agronet-backend:$COMMIT_SHA
  - gcr.io/$PROJECT_ID/agronet-backend:latest
